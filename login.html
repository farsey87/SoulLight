<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulLight Academy – Interner Bereich</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 40%, rgba(139,92,246,0.12) 0%, transparent 60%);
            pointer-events: none;
        }
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(139,92,246,0.5);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { opacity: 0; transform: translateY(-50px) scale(1); }
        }
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }
        .login-card {
            background: rgba(18, 18, 42, 0.95);
            border: 1px solid rgba(139,92,246,0.2);
            border-radius: 20px;
            padding: 48px 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 80px rgba(139,92,246,0.15);
            text-align: center;
            transition: border-color 0.3s;
        }
        .login-card:hover { border-color: rgba(139,92,246,0.4); }
        .login-logo {
            font-size: 3rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #8b5cf6, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            margin-bottom: 4px;
        }
        .login-subtitle {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 36px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #a78bfa;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(139,92,246,0.2);
            border-radius: 12px;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }
        .form-group input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
        }
        .form-group input::placeholder { color: #475569; }
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #8b5cf6, #c084fc);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(139,92,246,0.4);
        }
        .login-btn:active { transform: translateY(0); }
        .error-msg {
            display: none;
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            color: #fca5a5;
            font-size: 0.85rem;
        }
        .error-msg.show { display: block; animation: shake 0.4s ease; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .login-footer {
            margin-top: 28px;
            color: #475569;
            font-size: 0.75rem;
        }
        .login-footer a {
            color: #a78bfa;
            text-decoration: none;
        }
        .login-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">✦</div>
            <h1 class="login-title">SoulLight Academy</h1>
            <p class="login-subtitle">Interner Bereich – Bitte anmelden</p>

            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="username">Benutzername</label>
                    <input type="text" id="username" placeholder="Benutzername eingeben" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Passwort</label>
                    <input type="password" id="password" placeholder="Passwort eingeben" autocomplete="current-password" required>
                </div>
                <button type="submit" class="login-btn">Anmelden →</button>
                <div class="error-msg" id="errorMsg">⚠️ Benutzername oder Passwort ist falsch.</div>
            </form>

            <div class="login-footer">
                <a href="index.html">← Zurück zur Hauptseite</a>
            </div>
        </div>
    </div>

    <script>
        // Particles
        const pc = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (Math.random() * 12 + 6) + 's';
            p.style.animationDelay = (Math.random() * 8) + 's';
            p.style.width = (Math.random() * 3 + 1) + 'px';
            p.style.height = p.style.width;
            pc.appendChild(p);
        }

        // Simple hash function for client-side check
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Pre-computed SHA-256 hashes
        const VALID_USER_HASH = 'd84fe7e07bedb227cffff10009151d96fc944f6a1bd37cff60e8e4626a1eb1c3';
        const VALID_PASS_HASH = '978754917925f097f965b797445aee44f01b41da925a760e21aac3950a511476';

        async function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;

            const userHash = await sha256(user);
            const passHash = await sha256(pass);

            if (userHash === VALID_USER_HASH && passHash === VALID_PASS_HASH) {
                // Store auth token
                const token = await sha256(user + pass + 'soullight2026');
                sessionStorage.setItem('sl_auth', token);
                window.location.href = 'konzept.html';
            } else {
                document.getElementById('errorMsg').classList.add('show');
                setTimeout(() => {
                    document.getElementById('errorMsg').classList.remove('show');
                }, 3000);
            }
            return false;
        }

        // If already logged in, redirect
        if (sessionStorage.getItem('sl_auth')) {
            window.location.href = 'konzept.html';
        }
    </script>
</body>
</html>
